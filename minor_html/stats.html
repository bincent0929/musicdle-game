<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musicdle</title>
    <link rel="stylesheet" href="../styles/compiled-styles.css" />
    <link rel="stylesheet" href="../styles/top-bar.css" />

    <!--<script src="scripts/script.js"></script>-->
  </head>
  <body class="bg-gray-50 musicdle-body">
     <header class="musicdle-topbar">
      <div class="musicdle-topbar-inner">
        <nav class="musicdle-topbar-nav">
          <a class="musicdle-topbar-link" href="../index.html">Home</a>
          <a class="musicdle-topbar-link" href="stats.html">Stats</a>
        </nav>
        <span class="musicdle-topbar-title">Musicdle</span>
      </div>
     </header>
  
      <link rel="stylesheet" href="stats.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
    <h1 class="text-center text-8xl font-extrabold mb-16">Stats</h1>
    <div class="stats-container">
      <div class="chart-wrapper">        
        <canvas id="barChart"></canvas>       
      </div>
      <div class="stats-text font-sans">
        <p>Your current streak is <span id="currStreak"></span> days</p>
        <p>Your highest streak is <span id="maxStreak"></span> days</p>
        <p>Your top genre played is <span id="topGenre"></span></p>
        <p>Your top song guessed is <span id="topSong"></span></p>
      </div>

    </div>

    <script src="../scripts/stats.js"></script>
  </body>
</html>
