<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musicdle</title>
    <link rel="stylesheet" href="/styles/compiled-styles.css" />
  </head>

  <body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">
    <div class="max-w-4xl px-4">
      <h2 class="text-2xl font-bold text-center mb-4">Guess the Music!</h2>
      <div class="flex gap-2.5 flex-wrap items-center">
        <label>Genre:
          <select id="genre" class="px-3 py-2 border border-gray-300 rounded-lg text-base">
            <option value="14">Pop</option>
            <option value="18">Hip-Hop/Rap</option>
            <option value="21">Rock</option>
            <option value="6">Country</option>
            <option value="15">R&B/Soul</option>
            <option value="20">Alternative</option>
            <option value="17">Dance</option>
            <option value="11">Jazz</option>
            <option value="12">Latin</option>
            <option value="7">Electronic</option>
          </select>
        </label>
        <label>Country:
          <select id="country" class="px-3 py-2 border border-gray-300 rounded-lg text-base">
            <option value="us">US</option>
            <option value="gb">UK</option>
            <option value="ca">CA</option>
            <option value="au">AU</option>
            <option value="de">DE</option>
            <option value="jp">JP</option>
          </select>
        </label>
        <button id="new" class="px-3 py-2 border border-gray-300 rounded-lg text-base">Play a top song</button>
      </div>

      <div class="border border-gray-200 rounded-2xl p-4 mt-4">
        <audio id="player" controls preload="none" class="mx-auto block"></audio>

        <div class="flex gap-2.5 flex-wrap items-center mt-2.5">
          <!-- Guess input + dropdown -->
          <div class="relative flex-1 basis-[360px] max-w-[520px]">
            <input id="guess" placeholder="Guess the song title… (type an artist to browse their songs)" size="34" autocomplete="off" class="px-3 py-2 border border-gray-300 rounded-lg text-base w-full" />
            <div id="guessDD" class="absolute top-[calc(100%+0.25rem)] left-0 right-0 z-20 bg-white border border-gray-200 rounded-lg max-h-[260px] overflow-auto shadow-lg hidden" role="listbox" aria-label="Artist songs"></div>
          </div>
          <button id="submit" class="px-3 py-2 border border-gray-300 rounded-lg text-base">Submit</button>
          <!-- this reveal button is NOT working -->
          <button id="reveal" class="px-3 py-2 border border-gray-300 rounded-lg text-base text-gray-600 mx-auto block">Reveal</button>
        </div>
        <div id="bottom-info" class="text-center">
          <div id="status" class="mt-2 font-semibold"></div>
          <div id="meta" class="text-gray-600 mt-1.5"></div>
          <div class="flex gap-4 justify-center mt-3 text-sm text-gray-700">
            <div id="attempts" class="font-medium"></div>
            <div id="unlocked" class="font-medium"></div>
          </div>
        </div>
        <button id="finish" class="hidden mx-auto block px-3 py-2 bg-gradient-to-bl from-red-300 via-pink-200 to-red-300 hover:from-white-300 hover:via-red-400 hover:to-pink-500 border border-black rounded-lg text-base text-black font-medium shadow-md transition">Finish</button>
      </div>

      <script src="scripts/api.js"></script>
    </div>
    <!-- pop up when the game completes -->
    <div id="completion-Popup" class="fixed inset-0 flex items-center justify-center z-50 hidden" style="background-color: rgba(0, 0, 0, 0.75);">
      <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-11/12 p-8 text-center">
        <h1 class="text-4xl font-bold mb-2">Game <span class="text-blue-600">Completed</span>!</h1>
        <p class="text-xl mb-6">
          <strong>Score:</strong>
          <span id="Popup-score">0</span>
        </p>
        <p class="mb-4">
          <span aria-hidden="true" class="text-2xl">💾</span>
          <span class="ml-2">Do you want to save your progress?</span>
        </p>
        <div class="flex justify-center gap-3 mb-3">
          <button id="Popup-yes" class="px-6 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-900 transition">Yes</button>
          <button id="Popup-no" class="px-6 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition">No</button>
        </div>
        <p id="Popup-note" class="text-gray-600 mb-0 hidden">Saved! This run has been added to your device.</p>
        <hr class="my-6 border-gray-300" />
        <div class="flex justify-center gap-4">
          <button id="Popup-play-again" class="text-blue-600 font-bold hover:underline">Play again</button>
          <a href="index.html" class="text-blue-600 font-bold hover:underline">Home</a>
        </div>
      </div>
    </div>
  </body>
</html>
