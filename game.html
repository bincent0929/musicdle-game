<form>
  <div class="container text-center mt-4">
    <h2>Guess the Music</h2>

        <!-- audio player -->
        <audio id="audio" controls class="my-3">
          <source src="/assets/music/sample.mp3" type="audio/mpeg" />
          Your browser does not support the audio element.
        </audio>

    <div class="mb-2">
      <label for="song" class="mr-2">Song:</label>

      <input
        id="song"
        type="text"
        class="form-control d-inline-block"
        style="max-width: 280px"
        placeholder="(optional)"
      />
    </div>

    <!-- buttons: first loads sample next three are guesses -->
    <div class="btn-group-vertical" style="max-width: 320px; width: 100%">
      <button
        type="button"
        class="btn btn-primary mb-2 shadow-lg"
        onclick="loadSample();"
      >
        Load Sample
      </button>
      <button
        type="button"
        id="guessBtn1"
        class="btn btn-outline-primary mb-2 shadow"
        onclick="guessFromButton(this);"
        disabled
      >
        Guess 1
      </button>
      <button
        type="button"
        id="guessBtn2"
        class="btn btn-outline-primary mb-2 shadow"
        onclick="guessFromButton(this);"
        disabled
      >
        Guess 2
      </button>
      <button
        type="button"
        id="guessBtn3"
        class="btn btn-outline-primary mb-2 shadow"
        onclick="guessFromButton(this);"
        disabled
      >
        Guess 3
      </button>
    </div>

    <div id="result" class="mt-3 font-weight-bold"></div>
  </div>

  <div class="reset_button_div">
    <button id="reset_button">Do you want to reset the game?</button>
  </div>
</form>
