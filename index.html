<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musicdle</title>
    <link rel="stylesheet" href="/styles/compiled-styles.css" />
  </head>
  <body class="musicdle-body">
    
    <!--Black Banner at top-->
    <header class="musicdle-topbar">
      <div class="musicdle-topbar-inner">
        <nav class="musicdle-topbar-nav">
          <a class="musicdle-topbar-link" href="index.html">Home</a>
          <a class="musicdle-topbar-link" href="minor_html/stats.html">Stats</a>
        </nav>
        <span class="musicdle-topbar-title">MUSICDLE</span>
        <button id="theme-toggle" class="musicdle-theme-toggle" type="button" aria-label="Switch to light mode">
          <span class="theme-toggle-icon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>
    <!-- Welcome Page -->
    <div id="game" class="flex flex-col items-center justify-center min-h-screen">
      <div id="logo" class="flex items-center gap-4">
        <img class="w-12 h-12 object-contain bg-transparent" src="/assets/photos/8thNote.svg">
        <h1 class="text-4xl font-bold">Welcome To Musicdle</h1>
        <img class="w-12 h-12 object-contain bg-transparent" src="/assets/photos/8thNote.svg">
      </div>
      <div id="start_game_link" class="mt-6">
        <a href="game.html" 
          class="inline-block px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
          Start Game
        </a>
      </div>
    </div>
    
    <script src="/scripts/theme-toggle.js"></script>
  </body>
</html>
