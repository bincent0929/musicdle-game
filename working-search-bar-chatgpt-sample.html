<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musicdle</title>
    <link rel="stylesheet" href="/styles/compiled-styles.css" />
  </head>

  <body class="bg-gray-50">
    <div id="game_div" class="flex flex-col items-center justify-center min-h-screen">
      <label>Genre:
        <select id="genre">
          <option value="14">Pop</option>
          <option value="18">Hip-Hop/Rap</option>
          <option value="21">Rock</option>
          <option value="6">Country</option>
          <option value="15">R&B/Soul</option>
          <option value="20">Alternative</option>
          <option value="17">Dance</option>
          <option value="11">Jazz</option>
          <option value="12">Latin</option>
          <option value="7">Electronic</option>
        </select>
      </label>
      <label>Country:
        <select id="country">
          <option value="us">US</option>
          <option value="gb">UK</option>
          <option value="ca">CA</option>
          <option value="au">AU</option>
          <option value="de">DE</option>
          <option value="jp">JP</option>
        </select>
      </label>
      <button id="new">Play a top song</button>
      
      <div class="card">
        <audio id="player" controls preload="none"></audio>

        <div class="row" style="margin-top:.6rem">
          <!-- Guess input + dropdown -->
          <div class="guess-wrap">
            <input id="guess" placeholder="Guess the song title… (type an artist to browse their songs)" size="34" autocomplete="off" />
            <div id="guessDD" class="dropdown hidden" role="listbox" aria-label="Artist songs"></div>
          </div>
          <button id="submit">Submit</button>
          <button id="reveal" class="muted">Reveal</button>
        </div>

        <div class="result" id="status"></div>
        <div id="meta" class="muted" style="margin-top:.4rem"></div>
      </div>

      <script src="scripts/api.js"></script>
    </div>
  </body>
</html>
