<!--
  This is a working sample with a drop down that pulls from the top iTunes songs for a given genre and country.
  The reveal button is not currently working.
-->
<!doctype html><meta charset="utf-8">
<title>Genre Guess • iTunes Preview</title>
<style>
  body{font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem}
  header,.row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
  select,input,button{padding:.55rem .7rem;border:1px solid #ccc;border-radius:.6rem;font-size:1rem}
  .card{border:1px solid #e5e7eb;border-radius:1rem;padding:1rem;margin-top:1rem}
  .muted{color:#666}
  .result{margin-top:.5rem;font-weight:600}

  /* Dropdown attached to Guess input */
  .guess-wrap{position:relative; flex: 1 1 360px; max-width:520px}
  .dropdown{position:absolute; top:calc(100% + .25rem); left:0; right:0; z-index:20;
            background:#fff; border:1px solid #e5e7eb; border-radius:.6rem;
            max-height:260px; overflow:auto; box-shadow:0 8px 24px rgba(0,0,0,.08)}
  .dd-item{display:flex; gap:.6rem; align-items:center; padding:.55rem .7rem; cursor:pointer}
  .dd-item img{width:40px; height:40px; border-radius:.4rem; object-fit:cover}
  .dd-item:hover, .dd-item[aria-selected="true"]{background:#f3f4f6}
  .dd-title{font-weight:600}
  .hidden{display:none}
</style>

<header>
  <label>Genre:
    <select id="genre">
      <option value="14">Pop</option>
      <option value="18">Hip-Hop/Rap</option>
      <option value="21">Rock</option>
      <option value="6">Country</option>
      <option value="15">R&B/Soul</option>
      <option value="20">Alternative</option>
      <option value="17">Dance</option>
      <option value="11">Jazz</option>
      <option value="12">Latin</option>
      <option value="7">Electronic</option>
    </select>
  </label>
  <label>Country:
    <select id="country">
      <option value="us">US</option>
      <option value="gb">UK</option>
      <option value="ca">CA</option>
      <option value="au">AU</option>
      <option value="de">DE</option>
      <option value="jp">JP</option>
    </select>
  </label>
  <button id="new">Play a top song</button>
</header>

<div class="card">
  <audio id="player" controls preload="none"></audio>

  <div class="row" style="margin-top:.6rem">
    <!-- Guess input + dropdown -->
    <div class="guess-wrap">
      <input id="guess" placeholder="Guess the song title… (type an artist to browse their songs)" size="34" autocomplete="off" />
      <div id="guessDD" class="dropdown hidden" role="listbox" aria-label="Artist songs"></div>
    </div>
    <button id="submit">Submit</button>
    <button id="reveal" class="muted">Reveal</button>
  </div>

  <div class="result" id="status"></div>
  <div id="meta" class="muted" style="margin-top:.4rem"></div>
</div>

<script src="scripts/api.js"></script>
